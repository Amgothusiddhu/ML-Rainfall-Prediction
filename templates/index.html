<!DOCTYPE html>
<html>
<head>
    <title>Rainfall Prediction 🌧️</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
        }
        .card {
            border-radius: 15px;
            padding: 20px;
        }
        .title {
            font-weight: bold;
            font-size: 30px;
        }
        .result {
            font-size: 22px;
            color: yellow;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="card bg-dark text-white shadow-lg">

        <h2 class="text-center title">🌧️ Rainfall Prediction App</h2>

        <form action="/predict" method="post" class="mt-4">

            <div class="mb-3">
                <input type="number" step="any" name="f1" class="form-control" placeholder="🌡️ Temperature" required>
            </div>

            <div class="mb-3">
                <input type="number" step="any" name="f2" class="form-control" placeholder="💧 Humidity" required>
            </div>

            <div class="mb-3">
                <input type="number" step="any" name="f3" class="form-control" placeholder="🌬️ Wind Speed" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-warning btn-lg">⚡ Predict Rainfall</button>
            </div>

        </form>

        <div class="text-center mt-4 result">
            {{ prediction_text }}
        </div>

    </div>
</div>

</body>
</html>
